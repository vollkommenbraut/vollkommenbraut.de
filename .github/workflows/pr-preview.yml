name: PR Preview Notice

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoName = context.repo.repo;
            
            // PR previews are handled by Netlify (connected to this repo)
            // GitHub Pages redirects to the custom domain, so we can't use it for previews
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🔍 PR Preview\n\nPreview deployments are available via **Netlify**.\n\nConnect this repository to Netlify to enable automatic PR previews.\n\n> Note: GitHub Pages redirects to the custom domain (www.vollkommenbraut.de), so PR previews cannot be hosted there.`
            });


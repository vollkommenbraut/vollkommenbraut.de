# Netlify configuration for PR previews
# The main site is hosted on GitHub Pages with custom domain
# PR previews are deployed to Netlify

[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# Disable production deploys (main site is on GitHub Pages)
[context.production]
  command = "exit 1"

# Enable branch/PR deploys for previews
[context.deploy-preview]
  command = "rm -f CNAME && echo 'Preview ready'"

[context.branch-deploy]
  command = "rm -f CNAME && echo 'Branch deploy ready'"

# Headers for the preview
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

